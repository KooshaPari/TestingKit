version: "3"

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  default:
    desc: Run the default validation task
    cmds:
      - task: build

  build:
    desc: Build the repo using the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          (
            cd "{{.ROOT_DIR}}/rust" &&
            cargo build -p phenotype-testing -p phenotype-mock -p phenotype-test-fixtures -p phenotype-test-infra &&
            cargo build -p phenotype-compliance-scanner --no-default-features --features async-scan
          )
          exit 0
        fi

        pyproject="$(find "{{.ROOT_DIR}}" -path "*/.venv" -prune -o -name pyproject.toml -print -quit)"
        if [ -n "${pyproject}" ]; then
          project_dir="$(dirname "${pyproject}")"
          (cd "${project_dir}" && uv build)
          exit 0
        fi

        echo "No supported build manifest found." >&2
        exit 1

  test:
    desc: Run the test suite for the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          (
            cd "{{.ROOT_DIR}}/rust" &&
            cargo test -p phenotype-testing -p phenotype-mock -p phenotype-test-fixtures -p phenotype-test-infra &&
            cargo test -p phenotype-compliance-scanner --no-default-features --features async-scan
          )
          exit 0
        fi

        pyproject="$(find "{{.ROOT_DIR}}" -path "*/.venv" -prune -o -name pyproject.toml -print -quit)"
        if [ -n "${pyproject}" ]; then
          project_dir="$(dirname "${pyproject}")"
          (cd "${project_dir}" && uv run pytest)
          exit 0
        fi

        echo "No supported test manifest found." >&2
        exit 1

  lint:
    desc: Run formatter and linter checks for the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          (
            cd "{{.ROOT_DIR}}/rust" &&
            cargo fmt --check &&
            cargo clippy -p phenotype-testing -p phenotype-mock -p phenotype-test-fixtures -p phenotype-test-infra -- -D warnings &&
            cargo clippy -p phenotype-compliance-scanner --no-default-features --features async-scan -- -D warnings
          )
          exit 0
        fi

        pyproject="$(find "{{.ROOT_DIR}}" -path "*/.venv" -prune -o -name pyproject.toml -print -quit)"
        if [ -n "${pyproject}" ]; then
          project_dir="$(dirname "${pyproject}")"
          (
            cd "${project_dir}" &&
            uv run ruff check . &&
            uv run ruff format --check .
          )
          exit 0
        fi

        echo "No supported lint manifest found." >&2
        exit 1

  clean:
    desc: Remove build artifacts and caches for the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          (cd "{{.ROOT_DIR}}/rust" && cargo clean)
        fi
        rm -rf \
          "{{.ROOT_DIR}}/.ruff_cache" \
          "{{.ROOT_DIR}}/.pytest_cache" \
          "{{.ROOT_DIR}}/rust/target"
        find "{{.ROOT_DIR}}" -type d -name "__pycache__" -prune -exec rm -rf {} +
