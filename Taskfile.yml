version: "3"

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

tasks:
  default:
    desc: Run the default validation task
    cmds:
      - task: build

  build:
    desc: Build all detected project toolchains.
    cmds:
      - |
        set -eu
        found=0

        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          found=1
          (cd "{{.ROOT_DIR}}/rust" && cargo build --workspace)
        fi

        pyprojects="$(find "{{.ROOT_DIR}}" -path "*/.venv" -prune -o -name pyproject.toml -print | sort)"
        if [ -n "${pyprojects}" ]; then
          found=1
          printf '%s\n' "${pyprojects}" | while IFS= read -r pyproject; do
            project_dir="$(dirname "${pyproject}")"
            (cd "${project_dir}" && uv build)
          done
        fi

        if [ "${found}" -eq 0 ]; then
          echo "No supported build manifest found." >&2
          exit 1
        fi

  test:
    desc: Run tests for all detected project toolchains.
    cmds:
      - |
        set -eu
        found=0

        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          found=1
          (cd "{{.ROOT_DIR}}/rust" && cargo test --workspace)
        fi

        pyprojects="$(find "{{.ROOT_DIR}}" -path "*/.venv" -prune -o -name pyproject.toml -print | sort)"
        if [ -n "${pyprojects}" ]; then
          found=1
          printf '%s\n' "${pyprojects}" | while IFS= read -r pyproject; do
            project_dir="$(dirname "${pyproject}")"
            (cd "${project_dir}" && uv run pytest)
          done
        fi

        if [ "${found}" -eq 0 ]; then
          echo "No supported test manifest found." >&2
          exit 1
        fi

  lint:
    desc: Run formatter and linter checks for all detected project toolchains.
    cmds:
      - |
        set -eu
        found=0

        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          found=1
          (cd "{{.ROOT_DIR}}/rust" && cargo fmt --check && cargo clippy --workspace -- -D warnings)
        fi

        pyprojects="$(find "{{.ROOT_DIR}}" -path "*/.venv" -prune -o -name pyproject.toml -print | sort)"
        if [ -n "${pyprojects}" ]; then
          found=1
          printf '%s\n' "${pyprojects}" | while IFS= read -r pyproject; do
            project_dir="$(dirname "${pyproject}")"
            (
              cd "${project_dir}" &&
              uv run ruff check . &&
              uv run ruff format --check .
            )
          done
        fi

        if [ "${found}" -eq 0 ]; then
          echo "No supported lint manifest found." >&2
          exit 1
        fi

  clean:
    desc: Remove build artifacts and caches for all detected project toolchains.
    cmds:
      - |
        set -eu
        if [ -f "{{.ROOT_DIR}}/rust/Cargo.toml" ]; then
          (cd "{{.ROOT_DIR}}/rust" && cargo clean)
        fi
        rm -rf \
          "{{.ROOT_DIR}}/.ruff_cache" \
          "{{.ROOT_DIR}}/.pytest_cache" \
          "{{.ROOT_DIR}}/rust/target"
        find "{{.ROOT_DIR}}" -type d -name "__pycache__" -prune -exec rm -rf {} +
