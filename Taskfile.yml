version: "3"

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel
  RUST_DIR:
    sh: |
      if [ -f "$(git rev-parse --show-toplevel)/rust/Cargo.toml" ]; then
        echo "$(git rev-parse --show-toplevel)/rust"
      fi
  PYPROJECT:
    sh: |
      find "$(git rev-parse --show-toplevel)" \
        -path "*/.venv" -prune -o \
        -name pyproject.toml -print -quit
  RUST_CORE_PACKAGES: >-
    phenotype-testing
    phenotype-mock
    phenotype-test-fixtures
    phenotype-test-infra
  RUST_SCANNER_PACKAGE: phenotype-compliance-scanner
  RUST_SCANNER_FEATURES: async-scan

tasks:
  default:
    desc: Run the default validation task
    cmds:
      - task: build

  build:
    desc: Build the repo using the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -n "{{.RUST_DIR}}" ]; then
          (
            cd "{{.RUST_DIR}}" &&
            cargo build {{range $package := splitList " " .RUST_CORE_PACKAGES}}-p {{$package}} {{end}} &&
            cargo build -p {{.RUST_SCANNER_PACKAGE}} --no-default-features --features {{.RUST_SCANNER_FEATURES}}
          )
          exit 0
        fi

        if [ -n "{{.PYPROJECT}}" ]; then
          project_dir="$(dirname "{{.PYPROJECT}}")"
          (cd "${project_dir}" && uv build)
          exit 0
        fi

        echo "No supported build manifest found." >&2
        exit 1

  test:
    desc: Run the test suite for the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -n "{{.RUST_DIR}}" ]; then
          (
            cd "{{.RUST_DIR}}" &&
            cargo test {{range $package := splitList " " .RUST_CORE_PACKAGES}}-p {{$package}} {{end}} &&
            cargo test -p {{.RUST_SCANNER_PACKAGE}} --no-default-features --features {{.RUST_SCANNER_FEATURES}}
          )
          exit 0
        fi

        if [ -n "{{.PYPROJECT}}" ]; then
          project_dir="$(dirname "{{.PYPROJECT}}")"
          (cd "${project_dir}" && uv run pytest)
          exit 0
        fi

        echo "No supported test manifest found." >&2
        exit 1

  lint:
    desc: Run formatter and linter checks for the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -n "{{.RUST_DIR}}" ]; then
          (
            cd "{{.RUST_DIR}}" &&
            cargo fmt --check &&
            cargo clippy {{range $package := splitList " " .RUST_CORE_PACKAGES}}-p {{$package}} {{end}} -- -D warnings &&
            cargo clippy -p {{.RUST_SCANNER_PACKAGE}} --no-default-features --features {{.RUST_SCANNER_FEATURES}} -- -D warnings
          )
          exit 0
        fi

        if [ -n "{{.PYPROJECT}}" ]; then
          project_dir="$(dirname "{{.PYPROJECT}}")"
          (
            cd "${project_dir}" &&
            uv run ruff check . &&
            uv run ruff format --check .
          )
          exit 0
        fi

        echo "No supported lint manifest found." >&2
        exit 1

  clean:
    desc: Remove build artifacts and caches for the detected primary language toolchain.
    cmds:
      - |
        set -eu
        if [ -n "{{.RUST_DIR}}" ]; then
          (cd "{{.RUST_DIR}}" && cargo clean)
        fi
        rm -rf \
          "{{.ROOT_DIR}}/.ruff_cache" \
          "{{.ROOT_DIR}}/.pytest_cache" \
          "{{.ROOT_DIR}}/rust/target"
        find "{{.ROOT_DIR}}" -type d -name "__pycache__" -prune -exec rm -rf {} +
