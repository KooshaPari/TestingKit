# Generated coverage workflow - calls reusable phenotype workflow
name: Coverage
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:


timeout-minutes: 30
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    uses: KooshaPari/phenotype-infrakit/.github/workflows/coverage.yml@main
    secrets: inherit
