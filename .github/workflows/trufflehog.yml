name: Trufflehog Secrets Scan
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches: [main]
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: trufflehog/actions/setup@3fc0c2a225a9d249aea9b97a1c40c40a5ff7e0c0 # pinned from @main
      - run: trufflehog github --only-verified --no-update
        env:
          GH_TOKEN: \${{ secrets.GITHUB_TOKEN }}
