# Generated CI workflow - calls reusable phenotype workflow
name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:


timeout-minutes: 45
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    uses: KooshaPari/phenotype-infrakit/.github/workflows/ci.yaml@main
    secrets: inherit
